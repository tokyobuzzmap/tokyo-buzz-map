<title>TOKYO BUZZ MAP — 今、東京で熱い場所</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha384-c6Rcwz4e4CITMbu/NBmnNS8yN2sC3cUElMEMfP3vqqKFp7GOYaaBBCqmaWBjmkjb" crossorigin="anonymous">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Zen+Kaku+Gothic+New:wght@500&display=swap">
<style>
  :root {
    --ink: #111111;
    --paper: #faf8f4;
    --accent: #e8380d;
    --rise: #d97706;
    --cool: #8b93a5;
    --stable: #2e7d5b;
    --line: #e6dfd2;
    --sub: #767066;
    --warm: #f7ecdd;    /* ラテベージュ: 温度のあるサブ背景 */
    --blush: #fbeee7;   /* 朱の淡ティント: 選択・保存状態 */
    --radius: 12px;
    --serif: "Playfair Display", Georgia, "Times New Roman", serif;
    --jp-head: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ---------- Header ---------- */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 24px 0;
    flex-shrink: 0;
  }
  .head-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 {
    font-family: var(--serif);
    font-size: 28px;
    letter-spacing: .14em;
    font-weight: 700;
  }
  header h1 span { color: var(--accent); font-style: italic; letter-spacing: .04em; padding-right: .06em; }
  header .tagline { font-size: 11px; color: #b8b2a6; letter-spacing: 1px; }
  .hdr-controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #city-select {
    background: transparent;
    color: var(--paper);
    border: 1px solid #4d4c48;
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: var(--jp-head);
    cursor: pointer;
  }
  #city-select option { color: #111; }
  #lang-btn {
    background: transparent;
    color: var(--paper);
    border: 1px solid #4d4c48;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: var(--jp-head);
    letter-spacing: 1px;
    cursor: pointer;
  }
  #lang-btn:hover, #city-select:hover { border-color: var(--paper); }
  header .updated { font-size: 11px; color: #b8b2a6; }
  header .updated b { color: var(--paper); }
  .tabs { display: flex; gap: 4px; margin-top: 10px; }
  .tab {
    background: transparent;
    color: #b8b2a6;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 8px 16px 10px;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--jp-head);
    cursor: pointer;
    transition: all .15s;
  }
  .tab.active { color: var(--paper); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--paper); }
  /* ---------- Filters ---------- */
  .filters {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    align-items: center;
    -webkit-overflow-scrolling: touch;
  }
  .filters .label { font-size: 10px; letter-spacing: 1px; color: var(--sub); white-space: nowrap; }
  .chip {
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: var(--jp-head);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .chip.active { background: var(--ink); color: var(--paper); }
  .chip.st-peak.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.st-rising.active { background: var(--rise); border-color: var(--rise); color: #fff; }
  .chip.st-cooling.active { background: var(--cool); border-color: var(--cool); color: #fff; }
  .chip.st-stable.active { background: var(--stable); border-color: var(--stable); color: #fff; }
  .chip.saved-chip { border-color: var(--accent); color: var(--accent); }
  .chip.saved-chip.active { background: var(--accent); color: #fff; }
  /* ---------- Layout ---------- */
  .main { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; }
  aside {
    width: 400px;
    border-left: 1px solid var(--line);
    background: var(--paper);
    overflow-y: auto;
    flex-shrink: 0;
  }
  aside .count { padding: 20px 16px 10px; font-size: 11px; letter-spacing: 2px; color: var(--sub); border-bottom: 1px solid var(--line); }
  /* ---------- Card (A案: 写真主役の縦型) ---------- */
  #cards { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .2s, transform .2s;
  }
  .card { box-shadow: 0 2px 12px rgba(17,17,17,.06); }
  .card:hover { outline: 1px solid var(--accent); transform: translateY(-1px); }
  .card.selected { outline: 1px solid var(--accent); background: var(--blush); }
  .thumb { position: relative; background: var(--warm); }
  .thumb .photo { width: 100%; height: 190px; object-fit: cover; display: block; }
  .thumb .photo-ph {
    width: 100%; height: 190px;
    display: flex; align-items: center; justify-content: center;
    background: var(--warm);
    color: var(--sub);
    font-size: 10px; letter-spacing: 2px;
  }
  .thumb .stage-badge {
    position: absolute; top: 10px; left: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .save-btn {
    position: absolute; top: 10px; right: 10px;
    border: none;
    background: rgba(250,248,244,.94);
    color: var(--ink);
    font-size: 11px; font-weight: 700;
    padding: 5px 11px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  .save-btn.on { background: var(--accent); color: #fff; }
  .card .info { padding: 12px 14px 14px; }
  .card h3 { font-size: 15px; line-height: 1.35; font-family: var(--jp-head); }
  .card .meta { margin-top: 5px; font-size: 11px; color: var(--sub); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .card .why { margin-top: 8px; font-size: 12px; line-height: 1.6; color: #3d3a34; }
  .crowd { margin-top: 6px; font-size: 11px; color: var(--sub); }
  .crowd b { color: var(--ink); }
  /* ---------- Forecast strip ---------- */
  .forecast {
    margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
    background: var(--warm);
    border-radius: calc(var(--radius) - 4px);
    padding: 7px 10px;
  }
  /* 警報ラベル型バッジ(案2から移植) */
  .stage-badge {
    font-size: 11px; font-weight: 700;
    font-family: var(--jp-head);
    letter-spacing: 1px;
    white-space: nowrap;
    display: inline-block;
    padding: 3px 8px 3px 7px;
    border-radius: 4px;
    border-left: 3px solid;
  }
  .sg-peak { color: #c53008; border-color: var(--accent); background: #fdeae4; }
  .sg-rising { color: #b45f04; border-color: var(--rise); background: #fdf3e3; }
  .sg-cooling { color: #5c6474; border-color: var(--cool); background: #eef0f4; }
  .sg-stable { color: #1f5c43; border-color: var(--stable); background: #e7f2ec; }
  .spark { flex-shrink: 0; }
  .score-num {
    font-family: var(--serif);
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    font-feature-settings: "tnum";
  }
  .delta { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .delta.up { color: var(--accent); }
  .delta.down { color: var(--cool); }
  .delta.flat { color: var(--stable); }
  /* ---------- Badges / links ---------- */
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 9px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    background: transparent;
    color: var(--ink) !important;
    letter-spacing: 1px;
    text-decoration: none;
  }
  a.badge:hover { background: var(--ink); color: var(--paper) !important; }
  .b-new { background: var(--accent); border-color: var(--accent); color: #fff !important; }
  .sns-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    color: var(--ink) !important;
    background: transparent;
    text-decoration: none;
    transition: all .15s;
  }
  .sns-link svg { width: 15px; height: 15px; display: block; }
  .sns-link:hover { background: var(--ink); color: var(--paper) !important; }
  .cat-tag { border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; font-size: 10px; color: var(--sub); }
  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper { border-radius: var(--radius); background: var(--paper); overflow: hidden; }
  .leaflet-popup-content { margin: 0; font-family: inherit; width: 270px !important; }
  .pop .pop-img { width: 100%; height: 140px; object-fit: cover; display: block; background: var(--warm); }
  .pop .pop-ph { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 2px; color: var(--sub); background: var(--warm); border-bottom: 1px solid var(--line); }
  .pop .ig-embed { width: 100%; height: 330px; border: none; display: block; background: #fff; }
  .pop .inner { padding: 12px 14px 14px; }
  .pop h3 { font-size: 15px; margin-bottom: 3px; }
  .pop .area { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .pop .why { font-size: 12px; line-height: 1.6; margin: 6px 0; }
  .pop .links { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .pop .gmap {
    display: inline-block; margin-top: 8px;
    font-size: 12px; color: var(--accent); font-weight: 600; text-decoration: none;
  }
  .pop .gmap:hover { text-decoration: underline; }
  /* ---------- Marker / locate ---------- */
  .buzz-pin {
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 1px 5px rgba(0,0,0,.35);
  }
  #locate-btn svg { width: 15px; height: 15px; vertical-align: middle; }
  /* ---------- Ranking view ---------- */
  #rank-view { flex: 1; min-height: 0; overflow-y: auto; display: none; }
  .rank-wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 40px; }
  .rank-head { font-family: var(--serif); font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .rank-head small { display: block; font-family: inherit; font-size: 11px; color: var(--sub); font-weight: 400; margin-top: 4px; letter-spacing: .5px; }
  .rank-section { margin-top: 18px; font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: 1px; }
  .rank-row {
    display: flex; align-items: center; gap: 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-top: 8px;
    cursor: pointer;
    transition: box-shadow .15s;
  }
  .rank-row:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .rank-no {
    font-family: var(--serif);
    font-size: 20px; font-weight: 700;
    width: 34px; text-align: center;
    color: var(--sub);
    flex-shrink: 0;
  }
  .rank-no.top { color: var(--accent); font-size: 24px; }
  .rank-row .photo, .rank-row .photo-ph {
    width: 56px; height: 56px;
    border-radius: calc(var(--radius) - 4px);
    object-fit: cover;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--warm);
    color: var(--sub);
    font-size: 8px; letter-spacing: 1px;
  }
  .rank-info { flex: 1; min-width: 0; }
  .rank-info h3 { font-size: 13.5px; line-height: 1.3; font-family: var(--jp-head); }
  .rank-info .meta { font-size: 11px; color: var(--sub); margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .rank-delta { text-align: right; flex-shrink: 0; }
  .rank-delta .d { font-size: 17px; font-weight: 800; }
  .rank-delta .d.up { color: var(--accent); }
  .rank-delta .d.down { color: var(--cool); }
  .rank-delta .s { font-size: 10px; color: var(--sub); }
  footer {
    background: var(--paper);
    border-top: 1px solid var(--line);
    padding: 6px 16px;
    font-size: 10px;
    color: var(--sub);
    flex-shrink: 0;
  }
  /* ---------- Mobile: 地図フル画面+カルーセル ---------- */
  @media (max-width: 720px) {
    header { padding: 12px 16px 0; }
    header h1 { font-size: 18px; letter-spacing: 2px; }
    header .tagline, header .updated { display: none; }
    .main { position: relative; }
    #map { position: absolute; inset: 0; }
    aside {
      position: absolute; bottom: 0; left: 0;
      width: 100%;
      background: transparent;
      border: none;
      overflow-x: auto; overflow-y: hidden;
      z-index: 500;
    }
    aside .count { display: none; }
    #cards {
      display: flex; flex-direction: row;
      gap: 10px;
      padding: 0 12px 14px;
    }
    .card {
      min-width: 78vw;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .thumb .photo, .thumb .photo-ph { height: 130px; }
    .card .why { display: none; } /* モバイルは写真+予報に集中 */
  }
</style>
</head>

<header>

let meMarker = null, meCircle = null;
function locateMe() {
  if (!navigator.geolocation) { alert("このブラウザは位置情報に対応していません。"); return; }
  navigator.geolocation.getCurrentPosition(p => {
    const ll = [p.coords.latitude, p.coords.longitude];
    if (meMarker) map.removeLayer(meMarker);
    if (meCircle) map.removeLayer(meCircle);
    meCircle = L.circle(ll, { radius: p.coords.accuracy, color: "#1a73e8", weight: 1, fillColor: "#1a73e8", fillOpacity: .12 }).addTo(map);
    meMarker = L.circleMarker(ll, { radius: 7, color: "#fff", weight: 2.5, fillColor: "#1a73e8", fillOpacity: 1 })
      .addTo(map).bindPopup("現在地");
    map.flyTo(ll, 14, { duration: .8 });
  }, () => {
    alert("現在地を取得できませんでした。ブラウザの位置情報の許可設定を確認してください。");
  }, { enableHighAccuracy: true, timeout: 8000 });
}

// --- ヘルパー ---
const escHtml = v => String(v).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const score = s => s.history[s.history.length - 1];
const delta = s => score(s) - s.history[s.history.length - 2];

function deltaHtml(s) {
  const d = delta(s);
  if (d > 3)  return `<span class="delta up">▲ ${t("wk")} +${d}</span>`;
  if (d < -3) return `<span class="delta down">▼ ${t("wk")} ${d}</span>`;
  return `<span class="delta flat">${t("flatLabel")}</span>`;
}

function sparkline(s, w = 84, h = 26) {
  const vals = s.history;
  const max = 100, step = w / (vals.length - 1);
  const pts = vals.map((v, i) => `${(i * step).toFixed(1)},${(h - 3 - (v / max) * (h - 6)).toFixed(1)}`).join(" ");
  const color = STAGES[s.stage].pin;
  const last = pts.split(" ").pop().split(",");
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${color}"/>
  </svg>`;
}

  const url = imgCache[s.name];

    return `<img class="${cls}" src="${escHtml(url)}" alt="${escHtml(s.name)}" data-spot="${escHtml(s.name)}" loading="lazy">`;
  }
  if (ctx === "popup") return `<div class="pop-ph">NO PHOTO</div>`;
  return `<div class="photo-ph">PHOTO COMING SOON</div>`;
}

  return L.divIcon({
    className: "",
    html: `<div class="buzz-pin" style="width:${size}px;height:${size}px;background:${st.pin};"></div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
    popupAnchor: [0, -size / 2]
  });
}

function popupHtml(s) {
  const gmap = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(s.name + " " + s.area);
  // 店舗公式Instagram投稿があれば埋め込み、なければ写真
  const media = (s.ig && /^https:\/\/www\.instagram\.com\//.test(s.ig))
    ? `<iframe class="ig-embed" src="${escHtml(s.ig.replace(/\/?$/, "/embed"))}" loading="lazy"></iframe>`
    : photoHtml(s, "popup");
  return `<div class="pop">
    ${media}
    <div class="inner">
      <h3>${escHtml(s.name)}</h3>
      <div class="area">${escHtml(spotArea(s))} ｜ ${escHtml(catLabel(s.cat))}</div>
      <div class="forecast">${stageBadge(s)}${sparkline(s, 70, 24)}<span class="score-num" style="font-size:18px;">${score(s)}</span></div>
      <div class="crowd">${t("crowd")}: <b>${t("crowds")[s.stage]}</b></div>
      <div class="why">${escHtml(spotWhy(s))}</div>
      <div class="links">${snsLinks(s)}${s.isNew ? '<span class="badge b-new">2026 NEW</span>' : ""}</div>
      <a class="gmap" href="${gmap}" target="_blank" rel="noopener noreferrer">${t("gmap")}</a>
    </div>
  </div>`;
}

function visibleSpots() {
  return SPOTS.filter(s =>
    s.city === activeCity &&
    (activeCat === "すべて" || s.cat === activeCat) &&
    (activeStage === "all" || s.stage === activeStage) &&
    (!savedOnly || saved.has(s.name))
  );
}

function focusSpot(s) {
  setView("map");
  setTimeout(() => {
    map.flyTo([s.lat, s.lng], 15, { duration: .8 });
    markers[s.name] && markers[s.name].openPopup();
  }, 120);
}

function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const spots = visibleSpots();
  spots.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(s) }).addTo(map).bindPopup(popupHtml(s));
    markers[s.name] = m;
  });
  const sorted = [...spots].sort((a, b) => score(b) - score(a));
  document.getElementById("count").textContent = `${spots.length} ${t("countSuffix")}`;
  document.getElementById("cards").innerHTML = sorted.map(s => `
    <div class="card" data-name="${escHtml(s.name)}">
      <div class="thumb">
        ${photoHtml(s)}
        ${stageBadge(s)}
        <button class="save-btn ${saved.has(s.name) ? "on" : ""}" data-save="${escHtml(s.name)}">${saved.has(s.name) ? t("savedBtn") : t("save")}</button>
      </div>
      <div class="info">
        <h3>${escHtml(s.name)}</h3>
        <div class="meta">
          <span class="cat-tag">${escHtml(catLabel(s.cat))}</span>
          <span>${escHtml(spotArea(s))}</span>
          ${s.isNew ? '<span class="badge b-new">2026 NEW</span>' : ""}
        </div>
        <div class="forecast">
          ${sparkline(s)}
          <div>
            <div class="score-num">${score(s)}</div>
            ${deltaHtml(s)}
          </div>
        </div>
        <div class="crowd">${t("crowd")}: <b>${t("crowds")[s.stage]}</b></div>
        <div class="why">${escHtml(spotWhy(s))}</div>
        <div class="meta" style="margin-top:8px;">${snsLinks(s)}</div>
      </div>
    </div>`).join("");
  document.querySelectorAll(".card").forEach(c => {
    c.addEventListener("click", e => {
      if (e.target.closest("a")) return;
      const saveBtn = e.target.closest(".save-btn");
      if (saveBtn) { toggleSave(saveBtn.dataset.save); return; }
      const s = SPOTS.find(x => x.name === c.dataset.name);
      document.querySelectorAll(".card").forEach(x => x.classList.remove("selected"));
      c.classList.add("selected");
      map.flyTo([s.lat, s.lng], 15, { duration: .8 });
      markers[s.name] && markers[s.name].openPopup();
    });
  });
  renderRank();
}

// --- 急上昇ランキング ---
function rankRow(s, i, up) {
  const d = delta(s);
  return `
    <div class="rank-row" data-name="${escHtml(s.name)}">
      <div class="rank-no ${up && i < 3 ? "top" : ""}">${i + 1}</div>
      ${photoHtml(s, "rank")}
      <div class="rank-info">
        <h3>${escHtml(s.name)}</h3>
        <div class="meta">${stageBadge(s)}<span>${escHtml(spotArea(s))} ｜ ${escHtml(catLabel(s.cat))}</span></div>
      </div>
      ${sparkline(s, 70, 24)}
      <div class="rank-delta">
        <div class="d ${d >= 0 ? "up" : "down"}">${d >= 0 ? "▲ +" + d : "▼ " + d}</div>
        <div class="s">${t("index")} ${score(s)}</div>
      </div>
    </div>`;
}

function renderRank() {
  const byDelta = [...SPOTS].sort((a, b) => delta(b) - delta(a));
  const ups = byDelta.filter(s => delta(s) > 0);
  const downs = byDelta.filter(s => delta(s) < 0).reverse();
  document.getElementById("rank-up").innerHTML = ups.map((s, i) => rankRow(s, i, true)).join("");
  document.getElementById("rank-down").innerHTML = downs.map((s, i) => rankRow(s, i, false)).join("");
  document.querySelectorAll(".rank-row").forEach(r => {
    r.addEventListener("click", () => {
      const s = SPOTS.find(x => x.name === r.dataset.name);
      focusSpot(s);
    });
  });
}

// --- タブ切替 ---
function setView(v) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === v));
  const isMap = v === "map";
  document.querySelector(".main").style.display = isMap ? "flex" : "none";
  document.getElementById("stage-filters").style.display = isMap ? "flex" : "none";
  document.getElementById("cat-filters").style.display = isMap ? "flex" : "none";
  document.getElementById("rank-view").style.display = isMap ? "none" : "block";
  if (isMap) setTimeout(() => map.invalidateSize(), 60);
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => setView(t.dataset.view)));

// --- フィルタ生成(言語切替時に再構築) ---
function buildFilters() {
  const stageBox = document.getElementById("stage-filters");
  stageBox.innerHTML = `<span class="label" id="label-stage">${t("forecast")}</span>`;
  [["all", t("all"), ""], ...Object.keys(STAGES).map(k => [k, t("stages")[k], `st-${STAGES[k].cls}`])]
    .forEach(([key, label, cls]) => {
      const b = document.createElement("button");
      b.className = `chip ${cls}` + (key === activeStage || (key === "all" && activeStage === "all") ? " active" : "");
      b.textContent = label;
      b.addEventListener("click", () => {
        activeStage = key;
        stageBox.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        render();
      });
      stageBox.appendChild(b);
    });

  const catBox = document.getElementById("cat-filters");
  catBox.innerHTML = `<span class="label" id="label-cat">${t("category")}</span>`;
  CATS.forEach(cat => {
    const b = document.createElement("button");
    const isAll = cat === "すべて";
    b.className = "chip" + ((isAll && activeCat === "すべて") || cat === activeCat ? " active" : "");
    b.textContent = isAll ? t("all") : catLabel(cat);
    b.addEventListener("click", () => {
      activeCat = cat;
      catBox.querySelectorAll(".chip:not(.saved-chip)").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      render();
    });
    catBox.appendChild(b);
  });
  const savedBtn = document.createElement("button");
  savedBtn.className = "chip saved-chip" + (savedOnly ? " active" : "");
  savedBtn.textContent = t("savedList");
  savedBtn.addEventListener("click", () => {
    savedOnly = !savedOnly;
    savedBtn.classList.toggle("active", savedOnly);
    render();
  });
  catBox.appendChild(savedBtn);
}

// --- 都市セレクタ ---
function buildCitySelect() {
  const sel = document.getElementById("city-select");
  sel.innerHTML = "";
  Object.entries(CITIES).forEach(([key, c]) => {
    const o = document.createElement("option");
    o.value = key;
    o.textContent = c.active ? c[lang] : `${c[lang]} — ${t("comingSoon")}`;
    o.disabled = !c.active;
    if (key === activeCity) o.selected = true;
    sel.appendChild(o);
  });
}
document.getElementById("city-select").addEventListener("change", e => {
  const key = e.target.value;
  if (!CITIES[key] || !CITIES[key].active) return;
  activeCity = key;
  map.setView(CITIES[key].center, CITIES[key].zoom);
  render();
});

// --- 言語切替 ---
function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById("tagline").textContent = t("tagline");
  document.getElementById("updated-box").innerHTML = `${t("updated")}: <b>${UPDATED}</b>`;
  document.getElementById("lang-btn").textContent = lang === "ja" ? "EN" : "日本語";
  document.querySelector('.tab[data-view="map"]').textContent = t("tabMap");
  document.querySelector('.tab[data-view="rank"]').textContent = t("tabRank");
  document.getElementById("rank-title").textContent = t("rankTitle");
  document.getElementById("rank-sub").textContent = t("rankSub");
  document.getElementById("rank-cool-label").textContent = t("rankCool");
  document.getElementById("footer-note").textContent = t("footer");
  buildCitySelect();
  buildFilters();
  render();
}
document.getElementById("lang-btn").addEventListener("click", () => {
  lang = lang === "ja" ? "en" : "ja";
  try { localStorage.setItem("tbm-lang", lang); } catch (e) {}
  applyLang();
});

// ============================================================
// Wikipedia画像の自動取得(店舗提供・IG埋め込みが無いスポットのフォールバック)
// ============================================================
async function loadImages() {
  const wanted = [];
  SPOTS.forEach(s => (s.wiki || []).forEach(t => { if (!wanted.includes(t)) wanted.push(t); }));
  if (!wanted.length) return;
  try {
    const url = "https://ja.wikipedia.org/w/api.php?action=query&prop=pageimages&piprop=thumbnail&pithumbsize=480&pilicense=any"
      + "&format=json&formatversion=2&redirects=1&origin=*&titles=" + encodeURIComponent(wanted.join("|"));
    const res = await fetch(url);
    if (!res.ok) throw new Error("API " + res.status);
    const j = await res.json();
    const q = j.query || {};
    const resolve = {};
    (q.normalized || []).forEach(n => resolve[n.from] = n.to);
    (q.redirects || []).forEach(r => resolve[r.from] = r.to);
    const finalTitle = t => { let x = t, i = 0; while (resolve[x] && i++ < 4) x = resolve[x]; return x; };
    const thumbs = {};
    const OK_IMG = /^https:\/\/upload\.wikimedia\.org\//;
    (q.pages || []).forEach(p => {
      if (p.thumbnail && p.thumbnail.source && OK_IMG.test(p.thumbnail.source)) thumbs[p.title] = p.thumbnail.source;
    });
    SPOTS.forEach(s => {
      imgCache[s.name] = "none";
      for (const t of (s.wiki || [])) {
        const th = thumbs[finalTitle(t)];
        if (th) { imgCache[s.name] = th; break; }
      }
    });
  } catch (e) {
    console.warn("画像取得に失敗:", e);
    SPOTS.forEach(s => { if (!imgCache[s.name]) imgCache[s.name] = "none"; });
  }
  render();
}

applyLang();
loadImages();
