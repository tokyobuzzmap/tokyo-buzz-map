    cursor: pointer;

    why: "目黒川沿いの世界最大級ロースタリー。季節限定ドリンクのたびにSNSが動く定点観測スポット。" }
];

// ============================================================
// アプリ本体
// ============================================================
document.getElementById("updated-date").textContent = UPDATED;

const CATS = ["すべて", "グルメ", "カフェ・スイーツ", "新施設", "エンタメ", "フォトスポット", "ショップ"];
let activeCat = "すべて";
let activeStage = "all";
let markers = {};
const imgCache = {}; // spot.name -> url or "none"


// --- 地図 ---
const map = L.map("map", { zoomControl: true }).setView([35.6720, 139.7280], 12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

// --- 現在地ボタン (ズームボタンの直下) ---
const locCtl = L.control({ position: "topleft" });
locCtl.onAdd = () => {
  const d = L.DomUtil.create("div", "leaflet-bar");
  d.innerHTML = '<a href="#" id="locate-btn" title="現在地を表示" role="button" aria-label="現在地を表示">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg></a>';
  L.DomEvent.disableClickPropagation(d);
  d.querySelector("#locate-btn").addEventListener("click", e => { e.preventDefault(); locateMe(); });
  return d;
};
locCtl.addTo(map);

let meMarker = null, meCircle = null;
function locateMe() {
  if (!navigator.geolocation) { alert("このブラウザは位置情報に対応していません。"); return; }
  navigator.geolocation.getCurrentPosition(p => {
    const ll = [p.coords.latitude, p.coords.longitude];
    if (meMarker) map.removeLayer(meMarker);
    if (meCircle) map.removeLayer(meCircle);
    meCircle = L.circle(ll, { radius: p.coords.accuracy, color: "#1a73e8", weight: 1, fillColor: "#1a73e8", fillOpacity: .12 }).addTo(map);
    meMarker = L.circleMarker(ll, { radius: 7, color: "#fff", weight: 2.5, fillColor: "#1a73e8", fillOpacity: 1 })
      .addTo(map).bindPopup("現在地");
    map.flyTo(ll, 14, { duration: .8 });
  }, () => {
    alert("現在地を取得できませんでした。ブラウザの位置情報の許可設定を確認してください。\n(ローカルファイルでは動かないブラウザもあります。HTTPS公開後は安定します)");
  }, { enableHighAccuracy: true, timeout: 8000 });
}

// --- ヘルパー ---
const score = s => s.history[s.history.length - 1];
const delta = s => score(s) - s.history[s.history.length - 2];

function deltaHtml(s) {
  const d = delta(s);
  if (d > 3)  return `<span class="delta up">▲ 先週比 +${d}</span>`;
  if (d < -3) return `<span class="delta down">▼ 先週比 ${d}</span>`;
  return `<span class="delta flat">→ 横ばい</span>`;
}

function sparkline(s, w = 84, h = 26) {
  const vals = s.history;
  const max = 100, step = w / (vals.length - 1);
  const pts = vals.map((v, i) => `${(i * step).toFixed(1)},${(h - 3 - (v / max) * (h - 6)).toFixed(1)}`).join(" ");
  const color = STAGES[s.stage].pin;
  const last = pts.split(" ").pop().split(",");
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${color}"/>
  </svg>`;
}

function snsLinks(s) {
  const t = encodeURIComponent(s.tag);
  return `
    <a class="badge b-insta" target="_blank" rel="noopener noreferrer" href="https://www.instagram.com/explore/tags/${t}/">Instagram #</a>
    <a class="badge b-tiktok" target="_blank" rel="noopener noreferrer" href="https://www.tiktok.com/tag/${t}">TikTok #</a>
    <a class="badge b-x" target="_blank" rel="noopener noreferrer" href="https://x.com/search?q=%23${t}">X 検索</a>`;
}

function stageBadge(s) {
  const st = STAGES[s.stage];
  return `<span class="stage-badge sg-${st.cls}">${st.label}</span>`;
}

const escHtml = v => String(v).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function photoHtml(s, forPopup = false) {
  const url = imgCache[s.name];
  if (url && url !== "none") {
    const cls = forPopup ? "pop-img" : "photo";
    const lazy = forPopup ? "" : ' loading="lazy"';
    return `<img class="${cls}" src="${escHtml(url)}" alt="${escHtml(s.name)}" data-spot="${escHtml(s.name)}"${lazy}>`;
  }
  return forPopup
    ? `<div class="pop-ph">NO PHOTO</div>`
    : `<div class="photo-ph"><small>NO PHOTO</small></div>`;
}

// 画像読み込み失敗はイベント委任で拾い、プレースホルダーに差し替える
document.addEventListener("error", e => {
  const img = e.target;
  if (img && img.tagName === "IMG" && img.dataset.spot && imgCache[img.dataset.spot] !== "none") {
    imgCache[img.dataset.spot] = "none";
    render();
  }
}, true);

function makeIcon(spot) {
  const sc = score(spot);
  const size = sc >= 80 ? 26 : sc >= 55 ? 20 : 15;
  const st = STAGES[spot.stage];
  return L.divIcon({
    className: "",
    html: `<div class="buzz-pin" style="width:${size}px;height:${size}px;background:${st.pin};"></div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
    popupAnchor: [0, -size / 2]
  });
}

function popupHtml(s) {
  const gmap = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(s.name + " " + s.area);
  return `<div class="pop">
    ${photoHtml(s, true)}
    <div class="inner">
      <h3>${s.name}</h3>
      <div class="area">${s.area} ｜ ${s.cat}</div>
      <div class="forecast">${stageBadge(s)}${sparkline(s, 70, 24)}<span class="score-num" style="font-size:18px;">${score(s)}</span></div>
      <div class="why">${s.why}</div>
      <div class="links">${snsLinks(s)}${s.isNew ? '<span class="badge b-new">2026 NEW</span>' : ""}</div>
      <a class="gmap" href="${gmap}" target="_blank" rel="noopener noreferrer">Google Mapで開く →</a>
    </div>
  </div>`;
}

function visibleSpots() {
  return SPOTS.filter(s =>
    (activeCat === "すべて" || s.cat === activeCat) &&
    (activeStage === "all" || s.stage === activeStage)
  );
}

function focusSpot(s) {
  setView("map");
  setTimeout(() => {
    map.flyTo([s.lat, s.lng], 15, { duration: .8 });
    markers[s.name] && markers[s.name].openPopup();
  }, 120);
}

function render() {
  // --- マップ+カード ---
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const spots = visibleSpots();
  spots.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(s) }).addTo(map).bindPopup(popupHtml(s));
    markers[s.name] = m;
  });
  const sorted = [...spots].sort((a, b) => score(b) - score(a));
  document.getElementById("count").textContent = `${spots.length} SPOTS — バズ指数順`;
  document.getElementById("cards").innerHTML = sorted.map(s => `
    <div class="card" data-name="${s.name}">
      <div class="body">
        ${photoHtml(s)}
        <div class="info">
          <h3>${s.name}</h3>
          <div class="meta">
            <span class="cat-tag">${s.cat}</span>
            <span>${s.area}</span>
            ${s.isNew ? '<span class="badge b-new">2026 NEW</span>' : ""}
          </div>
          <div class="forecast">
            ${stageBadge(s)}
            ${sparkline(s)}
            <div>
              <div class="score-num">${score(s)}</div>
              ${deltaHtml(s)}
            </div>
          </div>
        </div>
      </div>
      <div class="why">${s.why}</div>
      <div class="meta" style="margin-top:6px;">${snsLinks(s)}</div>
    </div>`).join("");
  document.querySelectorAll(".card").forEach(c => {
    c.addEventListener("click", e => {
      if (e.target.closest("a")) return;
      const s = SPOTS.find(x => x.name === c.dataset.name);
      document.querySelectorAll(".card").forEach(x => x.classList.remove("selected"));
      c.classList.add("selected");
      map.flyTo([s.lat, s.lng], 15, { duration: .8 });
      markers[s.name] && markers[s.name].openPopup();
    });
  });
  renderRank();
}

// --- 急上昇ランキング ---
function rankRow(s, i, up) {
  const d = delta(s);
  return `
    <div class="rank-row" data-name="${s.name}">
      <div class="rank-no ${up && i < 3 ? "top" : ""}">${i + 1}</div>
      ${photoHtml(s)}
      <div class="rank-info">
        <h3>${s.name}</h3>
        <div class="meta">${stageBadge(s)}<span>${s.area} ｜ ${s.cat}</span></div>
      </div>
      ${sparkline(s, 70, 24)}
      <div class="rank-delta">
        <div class="d ${d >= 0 ? "up" : "down"}">${d >= 0 ? "▲ +" + d : "▼ " + d}</div>
        <div class="s">指数 ${score(s)}</div>
      </div>
    </div>`;
}

function renderRank() {
  const byDelta = [...SPOTS].sort((a, b) => delta(b) - delta(a));
  const ups = byDelta.filter(s => delta(s) > 0);
  const downs = byDelta.filter(s => delta(s) < 0).reverse(); // 下げ幅が大きい順
  document.getElementById("rank-up").innerHTML = ups.map((s, i) => rankRow(s, i, true)).join("");
  document.getElementById("rank-down").innerHTML = downs.map((s, i) => rankRow(s, i, false)).join("");
  document.querySelectorAll(".rank-row").forEach(r => {
    r.addEventListener("click", () => {
      const s = SPOTS.find(x => x.name === r.dataset.name);
      focusSpot(s);
    });
  });
}

// --- タブ切替 ---
function setView(v) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === v));
  const isMap = v === "map";
  document.querySelector(".main").style.display = isMap ? "flex" : "none";
  document.getElementById("stage-filters").style.display = isMap ? "flex" : "none";
  document.getElementById("cat-filters").style.display = isMap ? "flex" : "none";
  document.getElementById("rank-view").style.display = isMap ? "none" : "block";
  if (isMap) setTimeout(() => map.invalidateSize(), 60);
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => setView(t.dataset.view)));

// --- フィルタ生成 ---
const stageBox = document.getElementById("stage-filters");
[["all", "すべて", ""], ...Object.entries(STAGES).map(([k, v]) => [k, v.label, `st-${v.cls}`])]
  .forEach(([key, label, cls]) => {
    const b = document.createElement("button");
    b.className = `chip ${cls}` + (key === "all" ? " active" : "");
    b.textContent = label;
    b.addEventListener("click", () => {
      activeStage = key;
      stageBox.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      render();
    });
    stageBox.appendChild(b);
  });

const catBox = document.getElementById("cat-filters");
CATS.forEach(cat => {
  const b = document.createElement("button");
  b.className = "chip" + (cat === "すべて" ? " active" : "");
  b.textContent = cat;
  b.addEventListener("click", () => {
    activeCat = cat;
    catBox.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  });
  catBox.appendChild(b);
});

// ============================================================
// Wikipedia画像の自動取得
//  - MediaWiki Action API (origin=* でCORS公式対応) に1回のバッチ問い合わせ
//  - redirects=1 で記事名のゆらぎを吸収、候補タイトルを先頭から順に採用
//  - サイズはAPI側で生成(pithumbsize)するためURL書き換えによる404が起きない
// ============================================================
async function loadImages() {
  const wanted = [];
  SPOTS.forEach(s => (s.wiki || []).forEach(t => { if (!wanted.includes(t)) wanted.push(t); }));
  if (!wanted.length) return;
  try {
    const url = "https://ja.wikipedia.org/w/api.php?action=query&prop=pageimages&piprop=thumbnail&pithumbsize=480&pilicense=any"
      + "&format=json&formatversion=2&redirects=1&origin=*&titles=" + encodeURIComponent(wanted.join("|"));
    const res = await fetch(url);
    if (!res.ok) throw new Error("API " + res.status);
    const j = await res.json();
    const q = j.query || {};
    // 記事名の正規化・リダイレクトを解決するマップ
    const resolve = {};
    (q.normalized || []).forEach(n => resolve[n.from] = n.to);
    (q.redirects || []).forEach(r => resolve[r.from] = r.to);
    const finalTitle = t => { let x = t, i = 0; while (resolve[x] && i++ < 4) x = resolve[x]; return x; };
    const thumbs = {};
    const OK_IMG = /^https:\/\/upload\.wikimedia\.org\//; // 画像URLはWikimedia公式ドメインのみ許可
    (q.pages || []).forEach(p => {
      if (p.thumbnail && p.thumbnail.source && OK_IMG.test(p.thumbnail.source)) thumbs[p.title] = p.thumbnail.source;
    });
    SPOTS.forEach(s => {
      imgCache[s.name] = "none";
      for (const t of (s.wiki || [])) {
        const th = thumbs[finalTitle(t)];
        if (th) { imgCache[s.name] = th; break; }
      }
    });
  } catch (e) {
    console.warn("画像取得に失敗:", e);
    SPOTS.forEach(s => { if (!imgCache[s.name]) imgCache[s.name] = "none"; });
  }
  render();
}

render();
loadImages();
</script>
</body>
</html>
